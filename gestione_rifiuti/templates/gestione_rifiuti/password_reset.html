{% extends 'gestione_rifiuti/base.html' %}
{% block content %}
    <h1>Recupera Password 🔑</h1>
    <p>Inserisci il tuo indirizzo email. Ti invieremo le istruzioni per impostare una nuova password.</p>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Invia email di ripristino</button>
    </form>
{% endblock %}
